<!DOCTYPE html>
<html>
<head>
    <title>Error - Crystal Chatbox</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .error-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            color: #e74c3c;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        p {
            color: #555;
            margin: 0 0 30px 0;
            line-height: 1.6;
        }
        .back-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .back-button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>{{ title or "Error" }}</h1>
        <p>{{ message }}</p>
        <a href="/" class="back-button">← Back to Dashboard</a>
    </div>
</body>
</html>
