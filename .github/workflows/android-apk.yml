name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: Crystal Chatbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool libtool-bin m4 pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer/SDK downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('Crystal Chatbox/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.5.0" cython

      - name: CI speed tweaks
        run: |
          # Cut build time by targeting only 64-bit ARM (most modern Android/Quest devices)
          sed -i -E 's/^android\.archs[[:space:]]*=.*/android.archs = arm64-v8a/' buildozer.spec

      - name: Build debug APK
        env:
          PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
        run: |
          # Buildozer/sdkmanager prompts for Android SDK licenses; accept non-interactively in CI.
          # Avoid failing the step due to `yes` getting SIGPIPE when buildozer exits.
          set +e
          # Prefer the runner's preinstalled SDK/NDK to reduce downloads and flakiness.
          export ANDROIDSDK="${ANDROID_SDK_ROOT}"
          export ANDROIDNDK="${ANDROID_NDK_HOME}"

          # Capture full log for debugging.
          yes | buildozer -v android debug 2>&1 | tee buildozer.log
          status=${PIPESTATUS[1]}
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: |
            Crystal Chatbox/buildozer.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crystal-chatbox-apk
          path: |
            Crystal Chatbox/bin/*.apk
