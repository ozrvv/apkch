name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    defaults:
      run:
        working-directory: Crystal Chatbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Cache Buildozer/SDK downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('Crystal Chatbox/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "buildozer==1.5.0" cython

      - name: Build debug APK
        env:
          PYTHONFORANDROID_PREREQUISITES_INSTALL_INTERACTIVE: "0"
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crystal-chatbox-apk
          path: |
            Crystal Chatbox/bin/*.apk
